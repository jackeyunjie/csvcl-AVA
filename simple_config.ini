# 超简单配置文件 - 只需要修改这几个参数

[FILES]
# 文件名包含的字符串
pattern = KVBt_@_D1
# 时间限制（分钟）
time_limit = 10

[COLORS]
# 红色数值 (用逗号分隔)
red_values = 2,4,6
# 绿色数值
green_values = -2,-4,-6
# 黄色数值
yellow_values = 8

[AREA]
# 处理区域
target_range = E2:G40
# 截图区域
screenshot_range = A1:M40

[EMAIL]
# 收件人 (用逗号分隔)
recipients = 447372703@qq.com,1300893414@qq.com
# 发送时间
start_time = 07:00
end_time = 22:00

[ANALYSIS]
# 每组行数
rows_per_group = 3
# 重要数值变化
important_values = 2,6,-2,-6